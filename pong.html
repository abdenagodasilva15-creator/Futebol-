<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <link rel="stylesheet" href="pong.css">
</head>
<body>
    <div class="container">
        <h1>PONG GAME</h1>
        <div class="scoreboard">
            <div class="score-section">
                <p class="score-label">Player</p>
                <p class="score" id="playerScore">0</p>
            </div>
            <div class="divider">|</div>
            <div class="score-section">
                <p class="score-label">Computer</p>
                <p class="score" id="computerScore">0</p>
            </div>
        </div>
        
        <div class="game-info">
            <p>🎮 Use <strong>ARROW KEYS</strong> or <strong>MOUSE</strong> to move the left paddle</p>
            <p id="gameStatus">Press SPACE to start</p>
        </div>

        <canvas id="pongCanvas" width="800" height="400"></canvas>

        <div class="controls">
            <button id="startBtn">Start Game</button>
            <button id="resetBtn">Reset Game</button>
        </div>
    </div>

    <script src="pong.js"></script>
</body>
</html>
